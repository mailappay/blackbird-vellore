<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Bird Restaurant | Vellore</title>
    <style>
        /* CSS Variables */
        :root {
            --primary-color: #ffb703;
            --bg-color: #121212;
            --text-color: #ffffff;
            --secondary-bg: #1e1e1e;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* Header Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background-color: rgba(0, 0, 0, 0.9);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--primary-color);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: var(--primary-color);
        }

        .book-btn {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .book-btn:hover {
            background-color: #e0a000;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('1000177784.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 2rem;
            color: #ccc;
        }

        /* Section Formatting */
        section {
            padding: 5rem 5%;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        /* Menu Gallery */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .menu-item {
            background-color: var(--secondary-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        .menu-item:hover {
            transform: translateY(-5px);
        }

        .menu-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Food Gallery */
        .food-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .food-card {
            border-radius: 8px;
            overflow: hidden;
        }

        .food-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }

        .food-card img:hover {
            transform: scale(1.05);
        }

        /* Booking Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--secondary-bg);
            padding: 2.5rem;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-btn:hover {
            color: var(--primary-color);
        }

        .modal-content h2 {
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #444;
            background-color: #222;
            color: white;
            border-radius: 4px;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            background-color: var(--primary-color);
            color: #000;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Footer */
        footer {
            background-color: #0a0a0a;
            text-align: center;
            padding: 2rem;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

    <!-- Header / Navigation -->
    <header>
        <div class="logo">Black <span>Bird</span></div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#menu">Menu</a></li>
                <li><a href="#gallery">Gallery</a></li>
            </ul>
        </nav>
        <button class="book-btn" onclick="openModal()">Book a Table</button>
    </header>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <h1>Welcome to Black Bird</h1>
        <p>Experience the finest fast food, pizzas, beverages, and desserts in Vellore. Quality ingredients, exceptional taste.</p>
        <button class="book-btn" onclick="openModal()" style="padding: 1rem 2rem; font-size: 1.2rem;">Reserve Now</button>
    </section>

    <!-- Menu Section -->
    <section id="menu">
        <h2 class="section-title">Our Menu</h2>
        <div class="menu-grid">
            <div class="menu-item"><img src="1000177816.png" alt="Pizza Menu"></div>
            <div class="menu-item"><img src="1000177813.png" alt="Beverages Menu"></div>
            <div class="menu-item"><img src="1000177810.png" alt="Snacks Menu"></div>
            <div class="menu-item"><img src="1000177807.png" alt="Desserts Menu"></div>
            <div class="menu-item"><img src="1000177804.png" alt="Meals Menu"></div>
        </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery">
        <h2 class="section-title">Culinary Highlights</h2>
        <div class="food-gallery">
            <div class="food-card"><img src="1000177801.png" alt="Burger"></div>
            <div class="food-card"><img src="1000177787.png" alt="Fried Chicken"></div>
            <div class="food-card"><img src="1000177790.png" alt="Pizza"></div>
            <div class="food-card"><img src="1000177793.png" alt="Loaded Fries"></div>
            <div class="food-card"><img src="1000177784.png" alt="Dining Interior"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Black Bird Restaurant, Vellore. All systems operational.</p>
    </footer>

    <!-- Booking Modal Interface -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>Table Reservation</h2>
            <form id="bookingForm" onsubmit="submitForm(event)">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="time">Time</label>
                    <input type="time" id="time" required>
                </div>
                <div class="form-group">
                    <label for="guests">Number of Guests</label>
                    <select id="guests" required>
                        <option value="1">1 Person</option>
                        <option value="2">2 People</option>
                        <option value="3">3 People</option>
                        <option value="4">4 People</option>
                        <option value="5+">5+ People</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Confirm Booking</button>
            </form>
        </div>
    </div>

    <!-- JavaScript for Modal Operation -->
    <script>
        const modal = document.getElementById("bookingModal");

        function openModal() {
            modal.style.display = "flex";
        }

        function closeModal() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }

        function submitForm(event) {
            event.preventDefault();
            alert("Reservation data processed successfully. Awaiting confirmation.");
            closeModal();
            document.getElementById("bookingForm").reset();
        }
    </script>
</body>
</html>
